<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Leprechaun PayClock • Real-time Earnings</title>

  <!-- CSS externo -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <img src="/assets/1.%20Logo.png" alt="Leprechaun Finance" class="logo-image">
      <span>leprech finance</span>
    </div>
    <div class="theme-toggle">
      <button id="toggleTheme">Dark Mode</button>
    </div>
  </div>

  <div class="container">

    <!-- Títu lo e descrição -->
    <div style="padding: 0 0 16px 0;">
      <h1 style="margin: 0 0 8px 0; font-size: 28px; font-weight: bold;">WELCOME BACK TO THE SALARIÔMETRO!</h1>
      <p style="margin: 0; font-size: 14px; opacity: 0.7;">Ganho acumulado hoje entre 09:00 e 18:00</p>
    </div>

    <!-- Relógio principal: Dia -->
    <div class="main-card">
      <div class="big-value" id="earnedToday">R$ 0,00</div>
      <div style="font-size: 12px; opacity: 0.6;">ganho acumulado hoje</div>

      <!-- Valores horizontais -->
      <div class="main-card-values">
        <div class="value-item">
          <div class="value-label">R$/Hora</div>
          <div class="value-amount" id="perHour">-</div>
        </div>
        <div class="value-item">
          <div class="value-label">R$/Minuto</div>
          <div class="value-amount" id="perMinute">-</div>
        </div>
        <div class="value-item">
          <div class="value-label">R$/Segundo</div>
          <div class="value-amount" id="perSecond">-</div>
        </div>
        <div class="value-item">
          <div class="value-label">Mês</div>
          <div class="value-amount" id="earnedMonth">-</div>
        </div>
        <div class="value-item">
          <div class="value-label">Ano</div>
          <div class="value-amount" id="earnedYear">-</div>
        </div>
      </div>

      <div class="status" id="statusText" style="margin-top: 16px;"></div>
    </div>

    <!-- Cards de Empresas -->
    <div class="companies-section">
      <h2>Drill down by Partners</h2>
      <div class="companies-grid" id="companiesContainer">
        <!-- Preenchido dinamicamente via JavaScript -->
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="powered-by">
    <span>Powered by</span>
    <strong>Leprechaun Finance</strong>
    <span class="dot">•</span>
    <span>Emotional Tools</span>
  </div>

  <!-- JS externo -->
  <script src="script.js"></script>
</body>
</html>
